<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Minhas Vagas - Sistema de Vagas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 700px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #8b2b78;
            margin-bottom: 20px;
        }

        .vaga {
            text-align: left;
            margin-bottom: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
        }

        .vaga h3 {
            margin-top: 0;
            color: #E63946;
        }

        p {
            margin: 5px 0;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px 5px 0 0;
            font-size: 14px;
            color: #fff;
            background-color: #8b2b78;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #FF7A00;
        }

        .btn-create {
            display: block;
            width: 100%;
            margin-bottom: 20px;
            padding: 12px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Minhas Vagas</h2>

        <a href="{% url 'criar_vaga' %}" class="btn btn-create">Criar Nova Vaga</a>

        {% for vaga in vagas %}
            <div class="vaga">
                <h3>Vaga: {{ vaga.nome_vaga }}</h3>
                <p><strong>Faixa Salarial:</strong> {{ vaga.faixa_salarial }}</p>
                <p><strong>Requisitos:</strong> {{ vaga.requisitos }}</p>
                <p><strong>Escolaridade Mínima:</strong> {{ vaga.escolaridade_minima }}</p>

                <a href="{% url 'editar_vaga' vaga.id %}" class="btn">Editar</a>
                <a href="{% url 'deletar_vaga' vaga.id %}" class="btn">Deletar</a>
            </div>
        {% empty %}
            <p>Nenhuma vaga cadastrada</p>
        {% endfor %}
    </div>
</body>
</html>
