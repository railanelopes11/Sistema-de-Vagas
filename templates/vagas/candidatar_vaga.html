<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Candidatar-se à Vaga - Sistema de Vagas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background-color:#8b2b78;
            padding: 15px 20px;
            color: #fff;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #FF7A00;
        }


        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #8b2b78;
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background-color: #a36698;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #FF7A00;
        }

    </style>
</head>
<body>
    <header>
        <nav>
            <div>
                <a class="btn" href="{% url 'listar_vagas' %}">Vagas</a>
                <a class="btn" href="{% url 'relatorio' %}">Ver Relatórios</a>
            </div>

            <div>
                {% if user.is_authenticated %}
                    <span class="user-info">Logado como: {{ user.email }} ({{ user.tipo_usuario }})</span>
                    <a class="btn" href="{% url 'logout' %}">Sair</a>
                {% else %}
                    <a class="btn" href="{% url 'login' %}">Entrar</a>
                    <a class="btn" href="{% url 'cadastro' %}">Cadastrar</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <div class="container">
        <h2>Candidatar-se à vaga: {{ vaga.nome_vaga }}</h2>

        <form method="POST">
            {% csrf_token %}

            <label for="nome_completo">Nome completo:</label>
            <input type="text" name="nome_completo" id="nome_completo" required>

            <label for="pretensao_salarial">Pretensão salarial:</label>
            <input type="text" name="pretensao_salarial" id="pretensao_salarial" required>

            <label for="experiencia">Experiência:</label>
            <textarea name="experiencia" id="experiencia" required></textarea>

            <label for="ultima_escolaridade">Última escolaridade:</label>
            <select name="ultima_escolaridade" id="ultima_escolaridade" required>
                <option value="">Selecione</option>
                <option value="ensino_fundamental">Ensino Fundamental</option>
                <option value="ensino_medio">Ensino Médio</option>
                <option value="tecnologo">Tecnólogo</option>
                <option value="ensino_superior">Ensino Superior</option>
                <option value="pos_mba_mestrado">Pós/MBA/Mestrado</option>
                <option value="doutorado">Doutorado</option>
            </select>

            <button type="submit" class="btn">Enviar candidatura</button>
        </form>
    </div>
</body>
</html>
