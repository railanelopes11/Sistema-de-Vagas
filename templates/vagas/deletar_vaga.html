<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Deletar Vaga - Sistema de Vagas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color: #8b2b78;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            color: #fff;
            background-color: #8b2b78;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #FF7A00;
        }

        .btn-secondary {
            background-color: #555555;
        }

        .btn-secondary:hover {
            background-color: #333333;
        }

        form a {
            display: block;
            text-decoration: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Deletar Vaga</h2>
        <p>Tem certeza que deseja deletar a vaga "{{ vaga.nome_vaga }}"?</p>

        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn">Sim</button>
            <a href="{% url 'minhas_vagas' %}" class="btn btn-secondary">Não</a>
        </form>
    </div>
</body>
</html>
