<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Criar Vaga - Sistema de Vagas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color:  #8b2b78;
            margin-bottom: 20px;
        }

        label {
            display: block;
            text-align: left;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 20px 0;
            font-size: 16px;
            color: #fff;
            background-color:  #8b2b78;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #FF7A00; 
        }

        hr {
            border: 0;
            height: 2px;
            background-color: #FF7A00; 
            margin: 30px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Criar Vaga</h2>

        <form method="POST">
            {% csrf_token %}

            <label for="nome_vaga">Nome da Vaga:</label>
            <input type="text" name="nome_vaga" id="nome_vaga" required>

            <label for="faixa_salarial">Faixa Salarial:</label>
            <select name="faixa_salarial" id="faixa_salarial" required>
                <option value="">Selecione</option>
                <option value="até 1000">Até R$ 1000</option>
                <option value="de 1000 a 2000">De R$ 1000 - R$ 2000</option>
                <option value="de 2000 a 3000">De R$ 2000 - R$ 3000</option>
                <option value="acima de 3000">Acima de R$ 3000+</option>
            </select>

            <label for="requisitos">Requisitos:</label>
            <textarea name="requisitos" id="requisitos" required></textarea>

            <label for="escolaridade_minima">Escolaridade Mínima:</label>
            <select name="escolaridade_minima" id="escolaridade_minima" required>
                <option value="">Selecione</option>
                <option value="ensino_fundamental">Ensino Fundamental</option>
                <option value="ensino_medio">Ensino Médio</option>
                <option value="tecnologo">Tecnólogo</option>
                <option value="ensino_superior">Ensino Superior</option>
                <option value="pos_mba_mestrado">Pós/MBA/Mestrado</option>
                <option value="doutorado">Doutorado</option>
            </select>

            <button type="submit" class="btn">Criar</button>
        </form>
    </div>
</body>
</html>
