<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Sistema de Vagas</title>
</head>

<style>
   body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        header {
            background-color:#8b2b78;
            padding: 15px 20px;
            color: #fff;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #FF7A00;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color:  #8b2b78;
        }

        form {
            text-align: left;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background-color: #a36698;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #FF7A00; 
        }

        .login-link {
            margin-top: 20px;
            display: block;
            text-align: center;
            text-decoration: none;
            color: #E63946; 
            font-weight: bold;
        }

    
</style>

<body>
     <header>
        <nav>
            <div>
                <a class="btn" href="{% url 'listar_vagas' %}">Vagas</a>
                <a class="btn" href="{% url 'relatorio' %}">Ver Relatórios</a>
            </div>

            <div>
                {% if user.is_authenticated %}
                    <span class="user-info">Logado como: {{ user.email }} ({{ user.tipo_usuario }})</span>
                    <a class="btn" href="{% url 'logout' %}">Sair</a>
                {% else %}
                    <a class="btn" href="{% url 'login' %}">Entrar</a>
                    <a class="btn" href="{% url 'cadastro' %}">Cadastrar</a>
                {% endif %}
            </div>
        </nav>
    </header>

    <div class="container">

        <h2>Cadastro</h2>

    <form method="post">
        {% csrf_token %}

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" required>

        <label for="password">Senha:</label>
        <input type="password" name="password" id="password" required>

        <label for="password2">Confirmar Senha:</label>
        <input type="password" name="password2" id="password2" required>

        <label for="tipo_usuario">Tipo de usuário:</label>
        <select name="tipo_usuario" id="tipo_usuario" required>
            <option value="">Selecione</option>
            <option value="candidato">Candidato</option>
            <option value="empresa">Empresa</option>
        </select>

        <button type="submit" class="btn">Cadastrar</button>
    </form>

    <a href="{% url 'login' %}" class="login-link">Já tem conta? Ir para Login</a>
</div>
</body>
</html>
