<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Sistema de Vagas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 500px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color:  #8b2b78;
        }

        form {
            text-align: left;
        }

        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            font-size: 16px;
            color: #fff;
            background-color:  #8b2b78;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #FF7A00; 
        }

        .login-link {
            margin-top: 20px;
            display: block;
            text-align: center;
            text-decoration: none;
            color: #E63946; 
            font-weight: bold;
        }

        .messages p {
            color: red;
            margin: 10px 0 0 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Cadastro</h2>

        {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label for="email">Email:</label>
            <input type="email" name="email" id="email" required>

            <label for="password">Senha:</label>
            <input type="password" name="password" id="password" required>

            <label for="password2">Confirmar Senha:</label>
            <input type="password" name="password2" id="password2" required>

            <label for="tipo_usuario">Tipo de usuário:</label>
            <select name="tipo_usuario" id="tipo_usuario" required>
                <option value="">Selecione</option>
                <option value="candidato">Candidato</option>
                <option value="empresa">Empresa</option>
            </select>

            <button type="submit">Cadastrar</button>
        </form>

        <a href="/usuarios/login/" class="login-link">Já tem conta? Ir para Login</a>
    </div>
</body>
</html>
