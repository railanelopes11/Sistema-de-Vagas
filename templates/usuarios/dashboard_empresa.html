<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Área da Empresa - Sistema de Vagas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color:  #8b2b78;
            margin-bottom: 10px;
        }

        h3 {
            color: #E63946; 
            margin-top: 30px;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        hr {
            border: 0;
            height: 2px;
            background-color: #FF7A00; 
            margin: 30px 0;
        }

        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            font-size: 16px;
            color: #fff;
            background-color:  #8b2b78;
            border: none;
            border-radius: 5px;
            text-decoration: none;
            text-align: center;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #FF7A00; 
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Área da Empresa</h2>
        <p>Bem-vindo, {{ request.user.email }}</p>

        <hr>

        <h3>Gerenciar Vagas</h3>

        <a href="{% url 'criar_vaga' %}" class="btn">Criar Nova Vaga</a>
        <a href="{% url 'minhas_vagas' %}" class="btn">Ver Minhas Vagas</a>

        <hr>

        <a href="{% url 'logout' %}" class="btn">Sair</a>
    </div>
</body>
</html>
