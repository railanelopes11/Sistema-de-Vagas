<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Área da Empresa - Sistema de Vagas</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            margin: 0;
            padding: 0;
        }

         header {
            background-color:#8b2b78;
            padding: 15px 20px;
            color: #fff;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin: 0 10px;
            padding: 6px 12px;
            border-radius: 4px;
            transition: background-color 0.3s;
        }

        nav a:hover {
            background-color: #FF7A00;
        }


        .container {
            max-width: 600px;
            margin: 50px auto;
            padding: 30px;
            background-color: #fff;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        h2 {
            color:  #8b2b78;
            margin-bottom: 10px;
        }

        h3 {
            color: #E63946; 
            margin-top: 30px;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            margin-bottom: 20px;
        }

        hr {
            border: 0;
            height: 2px;
            background-color: #FF7A00; 
            margin: 30px 0;
        }

         .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 5px;
            background-color: #a36698;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .btn:hover {
            background-color: #FF7A00; 
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div>
                <a class="btn" href="{% url 'listar_vagas' %}">Vagas</a>
                <a class="btn" href="{% url 'relatorio' %}">Ver Relatórios</a>
            </div>

            <div>
                {% if user.is_authenticated %}
                    <span class="user-info">Logado como: {{ user.email }} ({{ user.tipo_usuario }})</span>
                    <a class="btn" href="{% url 'logout' %}">Sair</a>
                {% else %}
                    <a class="btn" href="{% url 'login' %}">Entrar</a>
                    <a class="btn" href="{% url 'cadastro' %}">Cadastrar</a>
                {% endif %}
            </div>
        </nav>
    </header> 
    
    <div class="container">
        <h2>Área da Empresa</h2>
        <p>Bem-vindo, {{ request.user.email }}</p>

        <hr>

        <h3>Gerenciar Vagas</h3>

        <a href="{% url 'criar_vaga' %}" class="btn">Criar Nova Vaga</a>
        <a href="{% url 'minhas_vagas' %}" class="btn">Ver Minhas Vagas</a>

        <hr>

    </div>
</body>
</html>
